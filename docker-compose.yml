services:
  postgres:
    container_name: hazlo-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hazlo
      POSTGRES_PASSWORD: hazlo
      POSTGRES_DB: hazlo
    ports:
      - "5433:5432"
    volumes:
      - hazlo_postgres_data:/var/lib/postgresql/data

volumes:
  hazlo_postgres_data:
