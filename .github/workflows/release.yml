name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Update __init__.py
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.version.outputs.version }}\"/" hazlo/__init__.py
          cat hazlo/__init__.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hazlo/__init__.py
          git commit -m "release: ${{ steps.version.outputs.version }} [skip ci]"
          git tag "${{ steps.version.outputs.version }}"

      - name: Push
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false