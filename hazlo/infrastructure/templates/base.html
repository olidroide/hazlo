<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hazlo Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_url('css/output.css') }}" onerror="this.remove(); window.__tailwind_cdn=true;">
    <script>if(window.__tailwind_cdn){document.write('<script src="https://cdn.tailwindcss.com"><\/script>');}</script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        if (typeof tailwind !== 'undefined') tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        teal: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
    <style>
        .btn-spinner { display: none; width: 1em; height: 1em; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full bg-neutral-50 dark:bg-neutral-900 text-neutral-900 dark:text-neutral-100"
    hx-boost="true"
    hx-target="#main-content"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) { document.querySelectorAll('.flash').forEach(el => el.remove()); }">

    <!-- Nav -->
    <nav class="bg-white dark:bg-neutral-800 border-b border-neutral-200 dark:border-neutral-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="shrink-0 flex items-center">
                            <a href="/admin/sources/" class="text-xl font-bold text-teal-600">Hazlo</a>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/admin/sources/"
                           class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-neutral-300">
                            Fuentes
                        </a>
                        <a href="/admin/events/?status=pending"
                           class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-neutral-300">
                            Eventos pendientes
                        </a>
                            <a href="/admin/llm-providers/"
                           class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-neutral-300">
                            Proveedores LLM
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button id="dark-mode-toggle"
                            class="p-2 rounded-md text-neutral-400 hover:text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-700"
                            aria-label="Toggle dark mode">
                        <svg class="h-5 w-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg class="h-5 w-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash messages -->
    <div id="flash-messages" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        {% for message in request.state.flash_messages %}
            <div class="flash rounded-md p-4 mb-4 {% if message.type == 'error' %}bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-200{% elif message.type == 'success' %}bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-200{% else %}bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-200{% endif %}">
                {{ message.text }}
            </div>
        {% endfor %}
    </div>

    <!-- Main content -->
    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        if (!window.__hazloInited) {
            window.__hazloInited = true;

            const toggle = document.getElementById('dark-mode-toggle');
            if (localStorage.getItem('dark-mode') === 'true' ||
                (!localStorage.getItem('dark-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            toggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark'));
            });

            document.body.addEventListener('htmx:beforeRequest', function(evt) {
                var btn = evt.target.closest('button, a');
                if (btn) {
                    btn.classList.add('opacity-60', 'pointer-events-none');
                    var spinner = btn.querySelector('.btn-spinner');
                    if (spinner) spinner.style.display = 'inline-block';
                }
            });
            document.body.addEventListener('htmx:afterRequest', function(evt) {
                var btn = evt.target.closest('button, a');
                if (btn) {
                    btn.classList.remove('opacity-60', 'pointer-events-none');
                    var spinner = btn.querySelector('.btn-spinner');
                    if (spinner) spinner.style.display = 'none';
                }
            });
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
