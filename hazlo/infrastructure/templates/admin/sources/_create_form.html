<div class="bg-white dark:bg-neutral-800 shadow-sm rounded-lg p-6">
    <h2 class="text-lg font-medium text-neutral-900 dark:text-white mb-4">Nueva fuente</h2>
    <form hx-post="/admin/sources"
          hx-target="#create-form-container"
          hx-swap="innerHTML"
          class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Nombre</label>
            <input type="text" name="name" id="name" required
                   class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
        </div>
        <div>
            <label for="source_type" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Tipo</label>
            <select name="source_type" id="source_type"
                    onchange="toggleSourceFields()"
                    class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
                <option value="rss">RSS / XML Feed</option>
                <option value="web">Web (Scraper)</option>
                <option value="email">Email (IMAP)</option>
            </select>
        </div>

        <!-- RSS / Web URL -->
        <div id="url-field">
            <label for="url" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">URL</label>
            <input type="url" name="url" id="url" required
                   placeholder="https://www.esmadrid.com/opendata/agenda_v1_es.xml"
                   class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
        </div>

        <!-- Email config fields -->
        <div id="email-fields" class="hidden space-y-4 border-t border-neutral-200 dark:border-neutral-700 pt-4">
            <h3 class="text-sm font-medium text-neutral-900 dark:text-white">Configuración IMAP</h3>
            <div>
                <label for="imap_host" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Host IMAP</label>
                <input type="text" name="imap_host" id="imap_host"
                       placeholder="imap.gmail.com"
                       class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="imap_port" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Puerto</label>
                    <input type="number" name="imap_port" id="imap_port" value="993"
                           class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
                </div>
                <div>
                    <label for="imap_ssl" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">SSL</label>
                    <select name="imap_ssl" id="imap_ssl"
                            class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
                        <option value="true">Sí</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="imap_user" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Usuario</label>
                <input type="email" name="imap_user" id="imap_user"
                       class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
            </div>
            <div>
                <label for="imap_password" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Contraseña</label>
                <input type="password" name="imap_password" id="imap_password"
                       class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
            </div>
            <div>
                <label for="imap_mailbox" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Mailbox</label>
                <input type="text" name="imap_mailbox" id="imap_mailbox" value="INBOX"
                       class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
            </div>
        </div>

        <!-- Web config fields -->
        <div id="web-fields" class="hidden space-y-4 border-t border-neutral-200 dark:border-neutral-700 pt-4">
            <h3 class="text-sm font-medium text-neutral-900 dark:text-white">Configuración Web (pendiente)</h3>
            <p class="text-sm text-neutral-500 dark:text-neutral-400">
                Los selectores CSS para scraping web se configurarán próximamente.
            </p>
        </div>

        <div>
            <label for="fetch_interval_minutes" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300">Intervalo (minutos)</label>
            <input type="number" name="fetch_interval_minutes" id="fetch_interval_minutes" value="60" min="1"
                   class="mt-1 block w-full rounded-md border-neutral-300 dark:border-neutral-600 dark:bg-neutral-700 dark:text-white shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
        </div>
        <div class="flex space-x-3">
            <button type="submit"
                    class="flex-1 px-4 py-2 text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 rounded-md shadow-sm">
                Crear fuente
            </button>
            <button type="button"
                    hx-on:click="document.getElementById('create-form-container').innerHTML = ''"
                    class="px-4 py-2 text-sm font-medium text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-700 border border-neutral-300 dark:border-neutral-600 rounded-md shadow-sm hover:bg-neutral-50 dark:hover:bg-neutral-600">
                Cancelar
            </button>
        </div>
    </form>
</div>

<script>
function toggleSourceFields() {
    const type = document.getElementById('source_type').value;
    const urlField = document.getElementById('url-field');
    const emailFields = document.getElementById('email-fields');
    const webFields = document.getElementById('web-fields');
    const urlInput = document.getElementById('url');

    urlField.classList.toggle('hidden', type === 'email');
    emailFields.classList.toggle('hidden', type !== 'email');
    webFields.classList.toggle('hidden', type !== 'web');
    urlInput.required = type !== 'email';
}
</script>
