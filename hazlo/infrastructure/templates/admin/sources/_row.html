<tr id="source-{{ source.id }}" class="hover:bg-neutral-50 dark:hover:bg-neutral-700">
    <td class="px-6 py-4 whitespace-nowrap">
        <a href="/admin/sources/{{ source.id }}" class="text-sm font-medium text-teal-600 hover:text-teal-700">
            {{ source.name }}
        </a>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="text-sm text-neutral-500 dark:text-neutral-400">{{ source.source_type }}</span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        {% if source.last_run_status == 'running' %}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300">
            Ejecutando...
        </span>
        {% elif source.is_active %}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300">
            Activa
        </span>
        {% else %}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300">
            Inactiva
        </span>
        {% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-500 dark:text-neutral-400">
        {% if source.last_run_at %}
        {{ source.last_run_at.strftime('%d/%m/%Y %H:%M') }}
        {% else %}
        Nunca
        {% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
        <button
            hx-post="/admin/sources/{{ source.id }}/run-now"
            hx-target="#source-{{ source.id }}"
            hx-swap="outerHTML"
            class="text-teal-600 hover:text-teal-700">
            Ejecutar ahora
        </button>
        <button
            hx-patch="/admin/sources/{{ source.id }}/toggle"
            hx-target="#source-{{ source.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Estás seguro?"
            class="text-neutral-600 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-white">
            {% if source.is_active %}Desactivar{% else %}Activar{% endif %}
        </button>
        <a href="/admin/sources/{{ source.id }}" class="text-teal-600 hover:text-teal-700">Ver</a>
    </td>
</tr>
