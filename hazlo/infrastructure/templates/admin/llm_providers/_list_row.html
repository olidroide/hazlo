<tr id="provider-row-{{ provider.id }}">
  <td class="px-6 py-4 whitespace-nowrap">{{ provider.name }}</td>
  <td class="px-6 py-4 whitespace-nowrap">{{ provider.provider_type }}</td>
  <td class="px-6 py-4 whitespace-nowrap">{{ provider.model }}</td>
  <td class="px-6 py-4 whitespace-nowrap">
    <input
      type="checkbox"
      hx-post="/admin/llm-providers/{{ provider.id }}/toggle-active"
      hx-swap="outerHTML"
      {% if provider.is_active %}checked{% endif %}
      class="w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500 cursor-pointer"
    />
  </td>
  <td class="px-6 py-4 whitespace-nowrap">{{ provider.priority }}</td>
  <td class="px-6 py-4 whitespace-nowrap">{% if provider.cost_per_1k_tokens_micros %}${{ "%.4f"|format(provider.cost_per_1k_tokens_micros / 1000000) }}{% else %}-{% endif %}</td>
  <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
    <span id="provider-test-result"></span>
    <button
      hx-post="/admin/llm-providers/{{ provider.id }}/test"
      hx-swap="none"
      class="text-indigo-600 hover:text-indigo-900 mr-3"
    >
      Test
    </button>
    <button
      hx-delete="/admin/llm-providers/{{ provider.id }}"
      hx-target="#provider-row-{{ provider.id }}"
      hx-swap="outerHTML"
      class="text-red-600 hover:text-red-900"
    >
      Delete
    </button>
  </td>
</tr>
