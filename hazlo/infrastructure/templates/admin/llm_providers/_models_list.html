{% if error %}
  <p class="text-sm text-red-600 mb-2">{{ error }}</p>
{% endif %}

{% if models %}
  <p class="text-xs font-medium text-gray-500 mb-2">{{ models|length }} model(s) available. Select one:</p>
  <div class="space-y-1 max-h-48 overflow-y-auto">
    {% for m in models %}
    <label class="flex items-start gap-2 p-2 rounded hover:bg-gray-100 cursor-pointer text-sm">
      <input type="radio" name="model" value="{{ m.id }}" required
             class="mt-0.5 text-blue-600 focus:ring-blue-500">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="font-mono text-xs text-gray-800 truncate">{{ m.display_name }}</span>
          {% if m.is_free %}
          <span class="px-1.5 py-0.5 text-xs font-medium rounded-full bg-green-100 text-green-800 whitespace-nowrap">Free</span>
          {% else %}
          <span class="px-1.5 py-0.5 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800 whitespace-nowrap">Paid</span>
          {% endif %}
        </div>
        <span class="text-xs text-gray-400 font-mono block truncate">{{ m.id }}</span>
        {% if m.description %}
        <p class="text-xs text-gray-500 mt-0.5 line-clamp-2">{{ m.description }}</p>
        {% endif %}
      </div>
    </label>
    {% endfor %}
  </div>
{% elif not error %}
  <p class="text-sm text-yellow-600">No models found for this API key.</p>
{% endif %}
