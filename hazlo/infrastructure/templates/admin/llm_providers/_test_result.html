{% if success %}
<span class="inline-flex items-center text-green-600 text-xs mr-3">
  <span class="text-green-500 mr-1">&#10003;</span> OK
</span>
{% else %}
<span class="inline-flex items-center text-red-600 text-xs mr-3">
  <span class="text-red-500 mr-1">&#10007;</span> Error
  <details class="ml-1">
    <summary class="cursor-pointer text-red-400 hover:text-red-600 text-xs">details</summary>
    <div class="mt-1 text-gray-700 text-xs max-w-md whitespace-normal wrap-break-word">{{ error or "Connection failed" }}</div>
  </details>
</span>
{% endif %}
